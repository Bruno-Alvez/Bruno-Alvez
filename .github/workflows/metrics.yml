name: Metrics

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ─── Main metrics (base + languages + isocalendar) ──────────────────────
      - name: Generate main metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bruno-Alvez
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          config_display: regular

          # Languages — compact mode, top 8, show % and bytes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_aliases: |
            JavaScript:JS
            TypeScript:TS

          # Isocalendar — full year contribution heatmap
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Recent activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_visibility: all

          filename: github-metrics.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update github-metrics.svg [skip ci]"

      # ─── Achievements / Radar ────────────────────────────────────────────────
      - name: Generate achievements metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bruno-Alvez
          base: ""
          config_timezone: America/Sao_Paulo

          # Achievements — detailed display (renders as radar/spider chart)
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          filename: github-metrics-achievements.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update github-metrics-achievements.svg [skip ci]"

      # ─── Habits / Radar chart (Commits, PRs, Issues, Code Reviews) ───────────
      - name: Generate habits radar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bruno-Alvez
          base: ""
          config_timezone: America/Sao_Paulo

          # Habits — includes radar chart of contribution types
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_charts_type: radar
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          filename: github-metrics-habits.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update github-metrics-habits.svg [skip ci]"
